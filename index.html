<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Länder der Erde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #f4f1eb;
  --surface:       #fffef9;
  --surface2:      #f0ede4;
  --border:        #ddd8cc;
  --text:          #1a1814;
  --text-muted:    #7a7468;
  --accent:        #2d5a27;
  --accent-light:  #e8f0e7;
  --accent-hover:  #246020;

  --tag-Europa-bg:   #e8eef7; --tag-Europa-fg:   #1a3a6b;
  --tag-Asien-bg:    #f7e8e8; --tag-Asien-fg:    #6b1a1a;
  --tag-Afrika-bg:   #f7f0d8; --tag-Afrika-fg:   #5a4000;
  --tag-Amerika-bg:  #e8f4f0; --tag-Amerika-fg:  #1a5a4a;
  --tag-Ozeanien-bg: #ede8f7; --tag-Ozeanien-fg: #3a1a6b;

  --un-bg:    #fdf3e3;
  --un-border:#e8c97a;
  --un-text:  #7a5200;

  --shadow:       0 2px 12px rgba(0,0,0,.07);
  --shadow-hover: 0 6px 24px rgba(0,0,0,.12);
  --radius:       12px;
  --transition:   .18s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.header-bar {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 68px;
  gap: 8px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  min-width: 0;
  overflow: hidden;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.55rem;
  letter-spacing: -.02em;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  flex-shrink: 1;
}

.header-spacer { flex: 1; min-width: 4px; }

/* Search */
.search-wrap {
  position: relative;
  flex-shrink: 1;
  min-width: 0;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}
input[type=search] {
  padding: 8px 10px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
  -webkit-appearance: none;
  appearance: none;
  width: 190px;
  min-width: 80px;
}
input[type=search]::-webkit-search-cancel-button { display: none; }
input[type=search]:focus { border-color: var(--accent); }

@media (min-width: 600px) {
  #searchWrapInline { display: block !important; }
  #searchWrapMobile { display: none !important; }
  #searchToggleBtn  { display: none !important; }
}
@media (max-width: 599px) {
  #searchWrapInline { display: none !important; }
  #searchWrapMobile {
    display: none;
    padding: 8px 12px 10px;
    border-top: 1px solid var(--border);
  }
  #searchWrapMobile.open { display: block; }
  #searchWrapMobile .search-inner { position: relative; }
  #searchWrapMobile .search-inner svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  #searchWrapMobile input[type=search] {
    width: 100%; min-width: 0;
    padding-top: 9px; padding-bottom: 9px;
  }
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}

.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  padding: 7px 9px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn.active { color: var(--accent); background: var(--accent-light); }
.icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.icon-btn .btn-label { display: none; }
@media (min-width: 820px) { .icon-btn .btn-label { display: inline; } }

.btn-flashcard {
  color: var(--accent);
  border: 1.5px solid var(--border);
}
.btn-flashcard:hover {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent-hover);
}

.hdr-divider {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

/* Filter bar */
.filter-bar {
  border-top: 1px solid var(--border);
  padding: 0 20px;
}
.filter-inner {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 8px 0;
  max-width: 1200px;
  margin: 0 auto;
}
.filter-inner::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-muted);
  transition: all var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.filter-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.result-pill {
  margin-left: auto;
  flex-shrink: 0;
  font-size: .7rem;
  color: var(--text-muted);
  padding: 4px 10px;
  background: var(--surface2);
  border-radius: 20px;
  border: 1px solid var(--border);
  align-self: center;
  display: none;
}
.result-pill.visible { display: block; }

/* ═══════════════════════════════════════════
   MAIN / CARDS
═══════════════════════════════════════════ */
main {
  max-width: 800px;
  margin: 0 auto;
  padding: 18px 14px 60px;
}

.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  font-size: .95rem;
}

.alpha-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 8px;
}
.alpha-letter {
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  color: var(--accent);
  min-width: 22px;
}
.alpha-line { flex: 1; height: 1px; background: var(--border); }

.continent-group { margin-bottom: 24px; }
.continent-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.continent-title {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.continent-line { flex: 1; height: 1px; background: var(--border); }
.continent-count { font-size: .72rem; color: var(--text-muted); font-weight: 500; }

.country-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 7px;
  overflow: hidden;
  transition: box-shadow var(--transition), border-color var(--transition);
}
.country-card:hover { box-shadow: var(--shadow-hover); border-color: #c5bfb5; }
.country-card.open { border-color: var(--accent); }

/* Karten mit UN-Hinweis bekommen einen leicht wärmeren Rand */
.country-card.un-hinweis { border-color: var(--un-border); }
.country-card.un-hinweis:hover { border-color: #c8a84a; }
.country-card.un-hinweis.open { border-color: var(--accent); }

.card-trigger {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 12px;
  width: 100%;
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  color: var(--text);
}
.card-trigger:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  border-radius: var(--radius);
}

.flag { font-size: 1.4rem; line-height: 1; flex-shrink: 0; width: 30px; text-align: center; }
.country-name { font-weight: 600; font-size: .95rem; flex: 1; }

/* Sternchen hinter dem Ländernamen */
.un-marker {
  display: inline-block;
  font-size: .75em;
  font-weight: 700;
  color: var(--un-text);
  vertical-align: super;
  line-height: 1;
  margin-left: 1px;
  cursor: help;
}

.continent-tag {
  font-size: .68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.tag-Europa   { color: var(--tag-Europa-fg);   background: var(--tag-Europa-bg); }
.tag-Asien    { color: var(--tag-Asien-fg);    background: var(--tag-Asien-bg); }
.tag-Afrika   { color: var(--tag-Afrika-fg);   background: var(--tag-Afrika-bg); }
.tag-Amerika  { color: var(--tag-Amerika-fg);  background: var(--tag-Amerika-bg); }
.tag-Ozeanien { color: var(--tag-Ozeanien-fg); background: var(--tag-Ozeanien-bg); }

.chevron {
  flex-shrink: 0;
  color: var(--text-muted);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.country-card.open .chevron { transform: rotate(180deg); }

.card-body {
  display: none;
  padding: 0 14px 14px 56px;
  animation: slideDown .2s ease;
}
.country-card.open .card-body { display: block; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-top: 2px;
}
.info-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
}
.info-label {
  font-size: .65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  margin-bottom: 3px;
}
.info-value {
  font-size: .88rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
}

/* Mehrere Hauptstädte: Zeilenumbrüche erlauben */
.info-value.multiline {
  white-space: pre-line;
}

.fakt-block {
  background: var(--accent-light);
  border: 1px solid #b8d4b5;
  border-radius: 8px;
  padding: 10px 13px;
  grid-column: 1 / -1;
}
.fakt-block .info-label { color: var(--accent); }
.fakt-block .info-value { font-size: .85rem; font-weight: 400; line-height: 1.5; color: #2a3d29; }

/* UN-Status-Block */
.un-block {
  background: var(--un-bg);
  border: 1px solid var(--un-border);
  border-radius: 8px;
  padding: 10px 13px;
  grid-column: 1 / -1;
}
.un-block .info-label { color: var(--un-text); }
.un-block .info-value { font-size: .85rem; font-weight: 400; line-height: 1.5; color: var(--un-text); }

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  display: none;
}

/* ═══════════════════════════════════════════
   LERNKARTEN OVERLAY
═══════════════════════════════════════════ */
.fc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,18,12,.78);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.fc-overlay.active { display: flex; }

.fc-box {
  background: var(--surface);
  border-radius: 20px;
  padding: 32px 28px 28px;
  max-width: 460px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,.3);
}

.fc-progress { font-size: .75rem; color: var(--text-muted); margin-bottom: 20px; font-weight: 500; }
.fc-flag { font-size: 2.6rem; line-height: 1; display: block; margin-bottom: 8px; }
.fc-question { font-family: 'DM Serif Display', serif; font-size: clamp(1.25rem, 5vw, 1.75rem); margin-bottom: 24px; line-height: 1.25; }
.fc-answer-box { background: var(--accent-light); border: 2px solid var(--accent); border-radius: 10px; padding: 12px 20px; font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 20px; white-space: pre-line; }
.fc-input { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); background: var(--bg); outline: none; text-align: center; transition: border-color var(--transition), background var(--transition); margin-bottom: 8px; }
.fc-input:focus { border-color: var(--accent); }
.fc-input.correct { border-color: #2d7a2d; background: #e8f5e8; }
.fc-input.wrong   { border-color: #c0392b; background: #fdecea; }
.fc-input:disabled { cursor: default; }
.fc-feedback { font-size: .88rem; margin-bottom: 14px; font-weight: 500; min-height: 1.4em; }
.fc-feedback.correct { color: #2d7a2d; }
.fc-feedback.wrong   { color: #c0392b; }

.fc-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
.fc-btn { padding: 10px 22px; border-radius: 10px; border: 2px solid; font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 600; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
.fc-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.fc-btn-secondary { border-color: var(--border); color: var(--text-muted); background: transparent; }
.fc-btn-secondary:hover { border-color: var(--text-muted); }
.fc-btn-reveal    { border-color: var(--accent); color: var(--accent); background: transparent; }
.fc-btn-reveal:hover { background: var(--accent-light); }
.fc-btn-primary   { border-color: var(--accent); color: white; background: var(--accent); }
.fc-btn-primary:hover { background: var(--accent-hover); }
.fc-btn-correct   { border-color: #2d7a2d; color: white; background: #2d7a2d; }
.fc-btn-correct:hover { background: #256025; }
.fc-btn-wrong     { border-color: #c0392b; color: white; background: #c0392b; }
.fc-btn-wrong:hover { background: #a93226; }

.fc-warning { color: #c0392b; font-size: .82rem; margin-top: 8px; min-height: 1.2em; }
.fc-start-title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-bottom: 20px; }
.fc-mode-row { margin-bottom: 20px; }
.fc-mode-label { font-size: .8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
.fc-mode-btns { display: flex; gap: 8px; justify-content: center; }
.fc-mode-btn { padding: 7px 18px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all var(--transition); }
.fc-mode-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.fc-letters-row { margin-bottom: 20px; }
.fc-letters-label { font-size: .78rem; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
.fc-letters-grid { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.fc-letter-btn { padding: 3px 7px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: .72rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all var(--transition); }
.fc-letter-btn:hover { border-color: var(--accent); color: var(--accent); }
.fc-letter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.fc-result-emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.fc-result-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 6px; }
.fc-result-sub   { font-size: .85rem; color: var(--text-muted); margin-bottom: 22px; }

@media (max-width: 500px) {
  .card-body { padding-left: 14px; }
  .info-grid  { grid-template-columns: 1fr 1fr; }
  .fc-btn     { padding: 9px 14px; font-size: .82rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-bar">
    <h1>Länder der Erde</h1>
    <div class="header-spacer"></div>

    <div class="search-wrap" id="searchWrapInline" role="search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Suchen …" autocomplete="off" aria-label="Land oder Hauptstadt suchen">
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="searchToggleBtn" aria-label="Suche ein-/ausblenden" aria-expanded="false">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>

      <div class="hdr-divider"></div>

      <button class="icon-btn" id="expandAllBtn" aria-label="Alle Karten aufklappen">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/>
        </svg>
        <span class="btn-label">Aufklappen</span>
      </button>
      <button class="icon-btn" id="collapseAllBtn" aria-label="Alle Karten zuklappen">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="7 11 12 6 17 11"/><polyline points="7 18 12 13 17 18"/>
        </svg>
        <span class="btn-label">Zuklappen</span>
      </button>

      <div class="hdr-divider"></div>

      <button class="icon-btn btn-flashcard" id="startFlashcardsBtn" aria-label="Lernkarten starten">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="3"/><line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        <span class="btn-label">Lernkarten</span>
      </button>
    </div>
  </div>

  <div id="searchWrapMobile" role="search">
    <div class="search-inner">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="searchInputMobile" placeholder="Suchen …" autocomplete="off" aria-label="Land oder Hauptstadt suchen">
    </div>
  </div>

  <div class="filter-bar">
    <nav class="filter-inner" aria-label="Nach Kontinent filtern">
      <button class="filter-btn active" data-filter="Alle">Alle</button>
      <button class="filter-btn" data-filter="Afrika">Afrika</button>
      <button class="filter-btn" data-filter="Amerika">Amerika</button>
      <button class="filter-btn" data-filter="Asien">Asien</button>
      <button class="filter-btn" data-filter="Europa">Europa</button>
      <button class="filter-btn" data-filter="Ozeanien">Ozeanien</button>
      <span class="result-pill" id="resultPill" aria-live="polite"></span>

    </nav>
  </div>
</header>

<main id="main" aria-live="polite">
  <div class="loading" id="loadingMsg" role="status">Daten werden geladen …</div>
  <div class="no-results" id="noResults" role="status" aria-atomic="true">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <p>Keine Länder gefunden.</p>
  </div>
</main>

<div class="fc-overlay" id="fcOverlay" role="dialog" aria-modal="true" aria-label="Lernkarten">
  <div class="fc-box" id="fcBox"></div>
</div>

<script>
const FLAGS = {
  "Afghanistan":"🇦🇫","Albanien":"🇦🇱","Algerien":"🇩🇿","Andorra":"🇦🇩",
  "Angola":"🇦🇴","Antigua und Barbuda":"🇦🇬","Argentinien":"🇦🇷",
  "Armenien":"🇦🇲","Aserbaidschan":"🇦🇿","Australien":"🇦🇺",
  "Bahamas":"🇧🇸","Bahrain":"🇧🇭","Bangladesch":"🇧🇩","Barbados":"🇧🇧",

function getFlag(n) { return FLAGS[n] || "🌐"; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/\s+/g, "").replace(/[^a-z0-9äöüéèàâêîôûñ]/g, "");
}

// Alle Varianten einer Hauptstadt extrahieren (für Lernkarten-Prüfung)
// Unterstützt sowohl "/" und "," als Trennzeichen als auch "\n" (mehrzeilige Einträge)
function getHauptstadtVarianten(hauptstadt) {
  return hauptstadt
    .split(/[\n/,]/)
    .map(s => s.replace(/\(.*?\)/g, "").trim())  // Klammerzusätze entfernen
    .filter(Boolean);
}

function debounce(fn, delay = 150) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

function alphaGroup(land) {
  const c = land[0].toUpperCase();
  return { "Ä":"A","Ö":"O","Ü":"U","É":"E","È":"E","Ñ":"N" }[c] ?? c;
}

function btnRowHTML(items) {
  return `<div class="fc-actions">${items.map(b =>
    `<button class="fc-btn ${b.cls}" ${b.id ? `id="${b.id}"` : ""} type="button">${b.label}</button>`
  ).join("")}</div>`;
}

function escapeHTML(str = "") {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function cssId(name) { return name.replace(/[^a-z0-9]/gi,"_").toLowerCase(); }

let LAENDER = [];
let currentFilter = "Alle";
let currentSearch  = "";
const activeCards  = new Set();

async function loadData() {
  try {
    const resp = await fetch("laender.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!Array.isArray(data) || !data.length) throw new Error("Leere Daten");
    return data;
  } catch (err) {
    const isFile = location.protocol === "file:";
    document.getElementById("loadingMsg").innerHTML = isFile
      ? "⚠️ Direktes Öffnen via <code>file://</code> blockiert den Datei-Zugriff.<br>Bitte einen lokalen Server verwenden."
      : `⚠️ <code>laender.json</code> konnte nicht geladen werden.<br><small>${err.message}</small>`;
    return null;
  }
}

function getFiltered() {
  const q = currentSearch.toLowerCase();
  return LAENDER.filter(l => {
    const mc = currentFilter === "Alle" || l.Kontinent === currentFilter;
    const ms = !q || l.Land.toLowerCase().includes(q) || l.Hauptstadt.toLowerCase().includes(q);
    return mc && ms;
  });
}

function renderList() {
  const filtered = getFiltered();
  const main      = document.getElementById("main");
  const noResults = document.getElementById("noResults");
  const pill      = document.getElementById("resultPill");

  if (filtered.length === LAENDER.length) {
    pill.textContent = ""; pill.classList.remove("visible");
  } else {
    pill.textContent = `${filtered.length} von ${LAENDER.length}`;
    pill.classList.add("visible");
  }

  Array.from(main.children).forEach(child => {
    if (child.id !== "noResults" && child.id !== "loadingMsg") child.remove();
  });

  if (!filtered.length) { noResults.style.display = "block"; return; }
  noResults.style.display = "none";

  if (currentFilter === "Alle") {
    let lastGroup = "";
    filtered.forEach(land => {
      const g = alphaGroup(land.Land);
      if (g !== lastGroup) {
        lastGroup = g;
        const div = document.createElement("div");
        div.className = "alpha-divider";
        div.setAttribute("aria-hidden", "true");
        div.innerHTML = `<span class="alpha-letter">${g}</span><span class="alpha-line"></span>`;
        main.insertBefore(div, noResults);
      }
      main.insertBefore(buildCard(land), noResults);
    });
  } else {
    const group = document.createElement("div");
    group.className = "continent-group";
    group.innerHTML = `<div class="continent-header">
      <span class="continent-title">${currentFilter}</span>
      <span class="continent-line"></span>
      <span class="continent-count">${filtered.length} Länder</span>
    </div>`;
    filtered.forEach(l => group.appendChild(buildCard(l)));
    main.insertBefore(group, noResults);
  }
}

function buildCard(land) {
  const flag      = getFlag(land.Land);
  const isOpen    = activeCards.has(land.Land);
  const keinUN    = land.UNMitglied === false;
  const card      = document.createElement("article");

  card.className = "country-card" + (isOpen ? " open" : "") + (keinUN ? " un-hinweis" : "");
  card.dataset.land = land.Land;

  // Sternchen mit Tooltip wenn kein UN-Mitglied
  const unMarker = keinUN
    ? `<span class="un-marker" title="Kein Mitglied der Vereinten Nationen">*</span>`
    : "";

  // Hauptstadt: mehrere Zeilen erlauben
  const hatMehrereHauptstaedte = land.Hauptstadt.includes("\n");
  const hauptstadtHTML = `<div class="info-value${hatMehrereHauptstaedte ? " multiline" : ""}">${escapeHTML(land.Hauptstadt)}</div>`;

  // UN-Status-Block im aufgeklappten Bereich
  const unBlockHTML = keinUN
    ? `<div class="info-block un-block">
         <div class="info-label">⚠️ UN-Status</div>
         <div class="info-value">Kein Mitglied der Vereinten Nationen · Die UN haben derzeit 193 Vollmitglieder.</div>
       </div>`
    : "";

  const faktHTML = land.Fakt
    ? `<div class="info-block fakt-block">
         <div class="info-label">💡 Wusstest du?</div>
         <div class="info-value">${escapeHTML(land.Fakt)}</div>
       </div>` : "";

  card.innerHTML = `
    <button class="card-trigger" aria-expanded="${isOpen}"
            aria-controls="body-${cssId(land.Land)}" type="button">
      <span class="flag" aria-hidden="true">${flag}</span>
      <span class="country-name">${escapeHTML(land.Land)}${unMarker}</span>
      <span class="continent-tag tag-${land.Kontinent}">${land.Kontinent}</span>
      <svg class="chevron" width="17" height="17" fill="none" stroke="currentColor"
           stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="card-body" id="body-${cssId(land.Land)}" role="region" aria-label="${escapeHTML(land.Land)}">
      <div class="info-grid">
        <div class="info-block">
          <div class="info-label">🏛 Hauptstadt</div>
          ${hauptstadtHTML}
        </div>
        <div class="info-block">
          <div class="info-label">👥 Bevölkerung</div>
          <div class="info-value">${escapeHTML(land.Bevölkerung)}</div>
        </div>
        <div class="info-block">
          <div class="info-label">📐 Fläche</div>
          <div class="info-value">${escapeHTML(land["Fläche"])}</div>
        </div>
        ${unBlockHTML}
        ${faktHTML}
      </div>
    </div>`;

  card.querySelector(".card-trigger").addEventListener("click", () => {
    const open = card.classList.toggle("open");
    card.querySelector(".card-trigger").setAttribute("aria-expanded", String(open));
    if (open) activeCards.add(land.Land); else activeCards.delete(land.Land);
  });
  return card;
}

const searchWrapMobile = document.getElementById("searchWrapMobile");
const searchInput      = document.getElementById("searchInput");
const searchInputMob   = document.getElementById("searchInputMobile");
const searchToggleBtn  = document.getElementById("searchToggleBtn");

function closeSearchMobile() {
  searchWrapMobile.classList.remove("open");
  searchToggleBtn.setAttribute("aria-expanded", "false");
  searchToggleBtn.classList.remove("active");
  searchInputMob.value = "";
  currentSearch = "";
  renderList();
}

searchToggleBtn.addEventListener("click", () => {
  const isOpen = searchWrapMobile.classList.contains("open");
  if (isOpen) {
    closeSearchMobile();
  } else {
    searchWrapMobile.classList.add("open");
    searchToggleBtn.setAttribute("aria-expanded", "true");
    searchToggleBtn.classList.add("active");
    searchInputMob.focus();
  }
});

searchInput.addEventListener("input", debounce(e => { currentSearch = e.target.value; renderList(); }, 150));
searchInputMob.addEventListener("input", debounce(e => { currentSearch = e.target.value; renderList(); }, 150));

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => { b.classList.remove("active"); b.removeAttribute("aria-current"); });
    btn.classList.add("active");
    btn.setAttribute("aria-current", "true");
    currentFilter = btn.dataset.filter;
    renderList();
  });
});

document.getElementById("expandAllBtn").addEventListener("click", () => {
  getFiltered().forEach(l => activeCards.add(l.Land)); renderList();
});
document.getElementById("collapseAllBtn").addEventListener("click", () => {
  getFiltered().forEach(l => activeCards.delete(l.Land)); renderList();
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && searchWrapMobile.classList.contains("open")) {
    closeSearchMobile(); searchToggleBtn.focus();
  }
});

/* ── Lernkarten ── */
const fcOverlay = document.getElementById("fcOverlay");
const fcBox     = document.getElementById("fcBox");
const FC = { pool:[], index:0, correct:0, wrong:0, mode:"reveal", selectedLetters:new Set(), availableLetters:[], initialized:false };

function openFC()  { fcOverlay.classList.add("active"); fcBox.focus(); }
function closeFC() { fcOverlay.classList.remove("active"); }

function renderStart() {
  const filtered = getFiltered();
  FC.availableLetters = [...new Set(filtered.map(l => alphaGroup(l.Land)))].sort();
  if (!FC.initialized) {
    FC.selectedLetters = new Set(FC.availableLetters);
    FC.initialized = true;
  } else {
    for (const l of FC.selectedLetters) {
      if (!FC.availableLetters.includes(l)) FC.selectedLetters.delete(l);
    }
  }
  const poolSize    = filtered.filter(l => FC.selectedLetters.has(alphaGroup(l.Land))).length;
  const allSelected = FC.selectedLetters.size === FC.availableLetters.length;
  const letterBtns  = FC.availableLetters.map(l =>
    `<button class="fc-letter-btn${FC.selectedLetters.has(l)?" active":""}" data-l="${escapeHTML(l)}" type="button" aria-pressed="${FC.selectedLetters.has(l)}">${l}</button>`
  ).join("");

  fcBox.innerHTML = `
    <div class="fc-start-title">Lernkarten</div>
    <div class="fc-mode-row">
      <div class="fc-mode-label">Modus</div>
      <div class="fc-mode-btns">
        <button class="fc-mode-btn${FC.mode==="reveal"?" active":""}" data-mode="reveal" type="button" aria-pressed="${FC.mode==="reveal"}">Aufdecken</button>
        <button class="fc-mode-btn${FC.mode==="type"?" active":""}" data-mode="type" type="button" aria-pressed="${FC.mode==="type"}">Eingabe</button>
      </div>
    </div>
    <div class="fc-letters-row">
      <div class="fc-letters-label">Buchstaben · <strong>${poolSize}</strong> Länder</div>
      <div class="fc-letters-grid">
        <button class="fc-letter-btn${allSelected?" active":""}" data-l="alle" type="button" aria-pressed="${allSelected}">Alle</button>
        ${letterBtns}
      </div>
    </div>
    <div class="fc-warning" id="fcStartWarning" role="alert" aria-live="polite"></div>
    ${btnRowHTML([
      { label:"Abbrechen", cls:"fc-btn-secondary", id:"fcCancelBtn" },
      { label:"Starten",   cls:"fc-btn-primary",   id:"fcStartBtn"  },
    ])}`;

  fcBox.querySelectorAll(".fc-mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      FC.mode = btn.dataset.mode;
      fcBox.querySelectorAll(".fc-mode-btn").forEach(b => { b.classList.toggle("active", b===btn); b.setAttribute("aria-pressed", String(b===btn)); });
    });
  });
  fcBox.querySelectorAll(".fc-letter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const l = btn.dataset.l;
      if (l === "alle") {
        FC.selectedLetters = FC.selectedLetters.size === FC.availableLetters.length ? new Set() : new Set(FC.availableLetters);
      } else {
        FC.selectedLetters.has(l) ? FC.selectedLetters.delete(l) : FC.selectedLetters.add(l);
      }
      renderStart();
    });
  });
  document.getElementById("fcStartBtn").addEventListener("click", () => {
    const pool = filtered.filter(l => FC.selectedLetters.has(alphaGroup(l.Land)));
    if (!pool.length) { document.getElementById("fcStartWarning").textContent = "⚠️ Bitte mindestens einen Buchstaben auswählen."; return; }
    FC.pool = shuffle(pool); FC.index = 0; FC.correct = 0; FC.wrong = 0;
    renderCard_FC();
  });
  document.getElementById("fcCancelBtn").addEventListener("click", closeFC);
}

function renderCard_FC() {
  if (FC.index >= FC.pool.length) { renderResult(); return; }
  const land = FC.pool[FC.index];
  const flag = getFlag(land.Land);
  const prog = `${FC.index+1} / ${FC.pool.length} · ✅ ${FC.correct} · ❌ ${FC.wrong}`;
  if (FC.mode === "reveal") renderReveal(land, flag, prog);
  else renderType(land, flag, prog);
}

function renderReveal(land, flag, prog) {
  fcBox.innerHTML = `
    <div class="fc-progress">${prog}</div>
    <span class="fc-flag" aria-hidden="true">${flag}</span>
    <div class="fc-question" aria-live="polite">Hauptstadt von<br><strong>${escapeHTML(land.Land)}</strong>?</div>
    ${btnRowHTML([
      { label:"Abbrechen",      cls:"fc-btn-secondary", id:"fcAbortBtn"  },
      { label:"Antwort zeigen", cls:"fc-btn-reveal",    id:"fcRevealBtn" },
    ])}`;
  document.getElementById("fcRevealBtn").addEventListener("click", () => {
    fcBox.innerHTML = `
      <div class="fc-progress">${prog}</div>
      <span class="fc-flag" aria-hidden="true">${flag}</span>
      <div class="fc-question">Hauptstadt von<br><strong>${escapeHTML(land.Land)}</strong>?</div>
      <div class="fc-answer-box" role="status" aria-live="polite">${escapeHTML(land.Hauptstadt)}</div>
      ${btnRowHTML([
        { label:"✗ Nicht gewusst", cls:"fc-btn-wrong",   id:"fcWrongBtn" },
        { label:"✓ Gewusst",       cls:"fc-btn-correct", id:"fcOkBtn"    },
      ])}`;
    document.getElementById("fcOkBtn").addEventListener("click",    () => { FC.correct++; FC.index++; renderCard_FC(); });
    document.getElementById("fcWrongBtn").addEventListener("click", () => { FC.wrong++;   FC.index++; renderCard_FC(); });
  });
  document.getElementById("fcAbortBtn").addEventListener("click", closeFC);
}

function renderType(land, flag, prog) {
  fcBox.innerHTML = `
    <div class="fc-progress">${prog}</div>
    <span class="fc-flag" aria-hidden="true">${flag}</span>
    <div class="fc-question" aria-live="polite">Hauptstadt von<br><strong>${escapeHTML(land.Land)}</strong>?</div>
    <input class="fc-input" id="fcInput" type="text" placeholder="Hauptstadt eingeben …"
           autocomplete="off" spellcheck="false" aria-label="Deine Antwort">
    <div class="fc-feedback" id="fcFeedback" role="status" aria-live="polite"></div>
    ${btnRowHTML([
      { label:"Abbrechen", cls:"fc-btn-secondary", id:"fcAbortBtn" },
      { label:"Prüfen",    cls:"fc-btn-reveal",    id:"fcCheckBtn" },
    ])}`;
  const input = document.getElementById("fcInput");
  input.focus();
  const check = () => {
    const val = input.value.trim();
    if (!val) return;
    const ni       = normalize(val);
    // Alle Varianten der Hauptstadt prüfen (inkl. mehrzeiliger Einträge)
    const varianten = getHauptstadtVarianten(land.Hauptstadt);
    const ok        = varianten.some(v => normalize(v) === ni);
    input.classList.add(ok ? "correct" : "wrong");
    input.disabled = true;
    const fb = document.getElementById("fcFeedback");
    // Bei mehreren Hauptstädten alle anzeigen
    const antwortText = varianten.length > 1
      ? varianten.join(" / ")
      : land.Hauptstadt;
    fb.textContent = ok ? "✓ Richtig!" : `✗ Richtig wäre: ${antwortText}`;
    fb.className   = "fc-feedback " + (ok ? "correct" : "wrong");
    if (ok) FC.correct++; else FC.wrong++;
    fcBox.querySelector(".fc-actions").innerHTML =
      `<button class="fc-btn fc-btn-primary" id="fcNextBtn" type="button">Weiter →</button>`;
    document.getElementById("fcNextBtn").addEventListener("click", () => { FC.index++; renderCard_FC(); });
    document.getElementById("fcNextBtn").focus();
  };
  input.addEventListener("keydown", e => { if (e.key === "Enter") check(); });
  document.getElementById("fcCheckBtn").addEventListener("click", check);
  document.getElementById("fcAbortBtn").addEventListener("click", closeFC);
}

function renderResult() {
  const total = FC.pool.length;
  const pct   = total > 0 ? Math.round(FC.correct / total * 100) : 0;
  const emoji = pct >= 80 ? "🎉" : pct >= 50 ? "👍" : "📚";
  fcBox.innerHTML = `
    <span class="fc-result-emoji" aria-hidden="true">${emoji}</span>
    <div class="fc-result-title">Fertig!</div>
    <div class="fc-result-sub" role="status">${FC.correct} richtig · ${FC.wrong} falsch · ${pct}&nbsp;%</div>
    ${btnRowHTML([
      { label:"Schließen", cls:"fc-btn-secondary", id:"fcDoneBtn"  },
      { label:"Nochmal",   cls:"fc-btn-primary",   id:"fcRetryBtn" },
    ])}`;
  document.getElementById("fcRetryBtn").addEventListener("click", () => {
    FC.pool = shuffle(FC.pool); FC.index = 0; FC.correct = 0; FC.wrong = 0; renderCard_FC();
  });
  document.getElementById("fcDoneBtn").addEventListener("click", closeFC);
}

document.getElementById("startFlashcardsBtn").addEventListener("click", () => {
  FC.initialized = false; openFC(); renderStart();
});
fcOverlay.addEventListener("click", e => { if (e.target === fcOverlay) closeFC(); });
fcOverlay.addEventListener("keydown", e => { if (e.key === "Escape") closeFC(); });

(async () => {
  const data = await loadData();
  if (!data) return;
  LAENDER = data;
  document.getElementById("loadingMsg").style.display = "none";
  renderList();
})();
</script>
</body>
</html>
