<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<title>Länder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- Anti-FOUC: Theme vor dem ersten Paint setzen -->
<script>
(function(){
  try {
    var s = localStorage.getItem('theme');
    if (s === 'dark' || s === 'light') document.documentElement.setAttribute('data-theme', s);
    var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (dark) document.documentElement.classList.add('is-dark');
  } catch(e){}
})();
</script>
</head>
<body>

<header>
  <div class="header-bar">
    <h1>Länder</h1>
    <div class="header-spacer"></div>

    <div class="search-wrap" id="searchWrapInline" role="search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Suchen …" autocomplete="off" aria-label="Land oder Hauptstadt suchen">
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="searchToggleBtn" aria-label="Suche ein-/ausblenden" aria-expanded="false">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>

      <div class="hdr-divider"></div>

      <button class="icon-btn" id="toggleAllBtn" aria-label="Alle Karten aufklappen">
        <svg id="toggleAllIcon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true" style="transition:transform .3s cubic-bezier(.4,0,.2,1)">
          <polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/>
        </svg>
        <span class="btn-label" id="toggleAllLabel">Aufklappen</span>
      </button>

      <div class="hdr-divider"></div>

      <button class="icon-btn" id="themeToggleBtn" aria-label="Dark Mode umschalten" aria-pressed="false">
        <span class="icon-sun" aria-hidden="true">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </span>
        <span class="icon-moon" aria-hidden="true">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
      </button>

      <div class="hdr-divider"></div>

      <button class="icon-btn btn-flashcard" id="startFlashcardsBtn" aria-label="Lernkarten starten">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="btn-label">Lernkarten</span>
      </button>
    </div>
  </div>

  <div id="searchWrapMobile" role="search">
    <div class="search-inner">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInputMobile" placeholder="Suchen …" autocomplete="off" aria-label="Land oder Hauptstadt suchen">
    </div>
  </div>

  <div class="filter-bar">
    <nav class="filter-inner" aria-label="Nach Kontinent filtern">
      <button class="filter-btn active" data-filter="Alle">Alle</button>
      <button class="filter-btn" data-filter="Afrika">Afrika</button>
      <button class="filter-btn" data-filter="Amerika">Amerika</button>
      <button class="filter-btn" data-filter="Asien">Asien</button>
      <button class="filter-btn" data-filter="Europa">Europa</button>
      <button class="filter-btn" data-filter="Ozeanien">Ozeanien</button>
      <span class="result-pill" id="resultPill" aria-live="polite"></span>
    </nav>
  </div>
</header>

<main id="main" aria-live="polite">
  <div class="loading" id="loadingMsg" role="status">Daten werden geladen …</div>
  <div class="no-results" id="noResults" role="status" aria-atomic="true">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>Keine Länder gefunden.</p>
  </div>
</main>

<div class="fc-overlay" id="fcOverlay" role="dialog" aria-modal="true" aria-label="Lernkarten">
  <div class="fc-box" id="fcBox"></div>
</div>

<script src="app.js"></script>
</body>
</html>
