<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Länder &amp; Hauptstädte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1eb;--surface:#fffef9;--surface2:#f0ede4;--border:#ddd8cc;--text:#1a1814;--text-muted:#7a7468;--accent:#2d5a27;--accent-light:#e8f0e7;--tag-Europa:#1a3a6b;--tag-Europa-bg:#e8eef7;--tag-Asien:#6b1a1a;--tag-Asien-bg:#f7e8e8;--tag-Afrika:#5a4000;--tag-Afrika-bg:#f7f0d8;--tag-Amerika:#1a5a4a;--tag-Amerika-bg:#e8f4f0;--tag-Ozeanien:#3a1a6b;--tag-Ozeanien-bg:#ede8f7;--shadow:0 2px 12px rgba(0,0,0,.07);--shadow-hover:0 6px 24px rgba(0,0,0,.12);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
h1{font-family:'DM Serif Display',serif;font-size:clamp(1.3rem,4vw,1.9rem);letter-spacing:-.02em}
.count-badge{font-size:.7rem;font-weight:600;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1px 8px}
.header-actions{display:flex;gap:4px;margin-left:auto;align-items:center;position:relative}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.icon-btn:hover{color:var(--accent)}
.icon-btn.active{color:var(--accent)}
.search-wrap{position:relative;width:100%;margin:6px 0 2px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
input[type=search]{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s}
input[type=search]:focus{border-color:var(--accent)}
.filter-btns{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:6px 0 12px}
.filter-btns::-webkit-scrollbar{display:none}
.filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap;flex-shrink:0}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.more-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;min-width:200px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.13);padding:6px;z-index:200;flex-direction:column;gap:2px}
.more-menu.open{display:flex}
.more-item{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);cursor:pointer;text-align:left;padding:9px 12px;border-radius:8px;transition:background .15s;width:100%}
.more-item:hover{background:var(--surface2);color:var(--accent)}
.result-info{font-size:.72rem;color:var(--text-muted);padding:4px 12px}

.fc-letter-filter{margin:10px 0 4px}
.fc-letter-label{font-size:.75rem;color:var(--text-muted);font-weight:500;margin-bottom:6px}
.fc-letter-btns{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.fc-letter-btn{padding:3px 7px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .15s}
.fc-letter-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-letter-btn.active{background:var(--accent);border-color:var(--accent);color:white}
main{max-width:800px;margin:0 auto;padding:18px 14px 60px}
.loading{text-align:center;padding:80px 20px;color:var(--text-muted);font-size:.95rem}
.alpha-divider{display:flex;align-items:center;gap:10px;margin:18px 0 8px}
.alpha-letter{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--accent);min-width:22px}
.alpha-line{flex:1;height:1px;background:var(--border)}
.continent-group{margin-bottom:24px}
.continent-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.continent-title{font-size:.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.continent-line{flex:1;height:1px;background:var(--border)}
.continent-count{font-size:.72rem;color:var(--text-muted);font-weight:500}
.country-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:7px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.country-card:hover{box-shadow:var(--shadow-hover);border-color:#c5bfb5}
.country-card.open{border-color:var(--accent)}
.card-trigger{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:12px;user-select:none}
.flag{font-size:1.4rem;line-height:1;flex-shrink:0;width:30px;text-align:center}
.country-name{font-weight:600;font-size:.95rem;flex:1}
.continent-tag{font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tag-Europa{color:var(--tag-Europa);background:var(--tag-Europa-bg)}
.tag-Asien{color:var(--tag-Asien);background:var(--tag-Asien-bg)}
.tag-Afrika{color:var(--tag-Afrika);background:var(--tag-Afrika-bg)}
.tag-Amerika{color:var(--tag-Amerika);background:var(--tag-Amerika-bg)}
.tag-Ozeanien{color:var(--tag-Ozeanien);background:var(--tag-Ozeanien-bg)}
.chevron{flex-shrink:0;color:var(--text-muted);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.country-card.open .chevron{transform:rotate(180deg)}
.card-body{display:none;padding:0 14px 14px 56px;animation:slideDown .2s ease}
.country-card.open .card-body{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:2px}
.info-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.info-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:3px}
.info-value{font-size:.88rem;font-weight:500;color:var(--text);line-height:1.35}
.fakt-block{background:var(--accent-light);border:1px solid #b8d4b5;border-radius:8px;padding:10px 13px;grid-column:1/-1}
.fakt-block .info-label{color:var(--accent)}
.fakt-block .info-value{font-size:.85rem;font-weight:400;line-height:1.5;color:#2a3d29}
.flashcard-overlay{display:none;position:fixed;inset:0;background:rgba(20,18,12,.78);z-index:200;align-items:center;justify-content:center;padding:16px}
.flashcard-overlay.active{display:flex}
.flashcard{background:var(--surface);border-radius:20px;padding:36px 28px;max-width:480px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.flashcard-progress{font-size:.75rem;color:var(--text-muted);margin-bottom:24px;font-weight:500}
.flashcard-flag{font-size:2.8rem;margin-bottom:10px;display:block}
.flashcard-question{font-family:'DM Serif Display',serif;font-size:clamp(1.3rem,5vw,1.9rem);margin-bottom:28px;line-height:1.2}
.fc-input-wrap{margin-bottom:16px}
.fc-input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text);background:var(--bg);outline:none;text-align:center;transition:border-color .2s}
.fc-input:focus{border-color:var(--accent)}
.fc-input.correct{border-color:#2d7a2d;background:#e8f5e8}
.fc-input.wrong{border-color:#c0392b;background:#fdecea}
.flashcard-answer{background:var(--accent-light);border:2px solid var(--accent);border-radius:10px;padding:13px 20px;font-size:1.1rem;font-weight:600;color:var(--accent);margin-bottom:20px;display:none;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.flashcard-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.fc-btn{padding:10px 22px;border-radius:10px;border:2px solid;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.fc-btn-reveal{border-color:var(--accent);color:var(--accent);background:transparent}
.fc-btn-reveal:hover{background:var(--accent-light)}
.fc-btn-correct{border-color:#2d7a2d;color:white;background:#2d7a2d}
.fc-btn-correct:hover{background:#256025}
.fc-btn-wrong{border-color:#c0392b;color:white;background:#c0392b}
.fc-btn-wrong:hover{background:#a93226}
.fc-btn-close{border-color:var(--border);color:var(--text-muted);background:transparent}
.fc-btn-close:hover{border-color:var(--text-muted)}
.fc-result{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:14px}
.fc-result-details{font-size:.83rem;color:var(--text-muted);margin-bottom:22px}
.fc-mode-select{margin-bottom:24px}
.fc-mode-label{font-size:.8rem;color:var(--text-muted);margin-bottom:10px;font-weight:500}
.fc-mode-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fc-mode-btn{padding:8px 18px;border-radius:10px;border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all .15s}
.fc-mode-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.no-results{text-align:center;padding:60px 20px;color:var(--text-muted);display:none}
@media(max-width:500px){.card-body{padding-left:14px}.info-grid{grid-template-columns:1fr 1fr}.actions-row{gap:5px}}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>Länder &amp; Hauptstädte</h1>
    <span class="count-badge" id="countBadge">…</span>
    <div class="header-actions">
      <button class="icon-btn" id="searchToggleBtn" title="Suchen">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="icon-btn" id="moreBtn" title="Mehr">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="19" cy="12" r="1.2" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
  <div class="search-wrap" id="searchWrap" style="display:none">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Land oder Hauptstadt suchen …" autocomplete="off">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="Alle">Alle</button>
    <button class="filter-btn" data-filter="Afrika">Afrika</button>
    <button class="filter-btn" data-filter="Amerika">Amerika</button>
    <button class="filter-btn" data-filter="Asien">Asien</button>
    <button class="filter-btn" data-filter="Europa">Europa</button>
    <button class="filter-btn" data-filter="Ozeanien">Ozeanien</button>
  </div>
  <div class="more-menu" id="moreMenu">
    <button class="more-item" id="expandAllBtn">↕ Alle aufklappen</button>
    <button class="more-item" id="collapseAllBtn">↕ Alle zuklappen</button>
    <button class="more-item" id="startFlashcardsBtn">🃏 Lernkarten starten</button>
    <span class="result-info" id="resultInfo"></span>
  </div>
</header>
<main id="main">
  <div class="loading" id="loadingMsg">Daten werden geladen …</div>
  <div class="no-results" id="noResults">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>Keine Länder gefunden.</p>
  </div>
</main>
<div class="flashcard-overlay" id="flashcardOverlay">
  <div class="flashcard" id="flashcard"></div>
</div>
<script>
const FLAGS = {"Afghanistan": "🇦🇫", "Albanien": "🇦🇱", "Algerien": "🇩🇿", "Andorra": "🇦🇩", "Angola": "🇦🇴", "Antigua und Barbuda": "🇦🇬", "Argentinien": "🇦🇷", "Armenien": "🇦🇲", "Aserbaidschan": "🇦🇿", "Australien": "🇦🇺", "Bahamas": "🇧🇸", "Bahrain": "🇧🇭", "Bangladesch": "🇧🇩", "Barbados": "🇧🇧", "Belarus": "🇧🇾", "Belgien": "🇧🇪", "Belize": "🇧🇿", "Benin": "🇧🇯", "Bhutan": "🇧🇹", "Bolivien": "🇧🇴", "Bosnien und Herzegowina": "🇧🇦", "Botswana": "🇧🇼", "Brasilien": "🇧🇷", "Brunei": "🇧🇳", "Bulgarien": "🇧🇬", "Burkina Faso": "🇧🇫", "Burundi": "🇧🇮", "Chile": "🇨🇱", "China, Republik / Taiwan": "🇹🇼", "China, Volksrepublik": "🇨🇳", "Costa Rica": "🇨🇷", "Dänemark": "🇩🇰", "Deutschland": "🇩🇪", "Dominica": "🇩🇲", "Dominikanische Republik": "🇩🇴", "Dschibuti": "🇩🇯", "Ecuador": "🇪🇨", "El Salvador": "🇸🇻", "Elfenbeinküste": "🇨🇮", "Eritrea": "🇪🇷", "Estland": "🇪🇪", "Eswatini": "🇸🇿", "Fidschi": "🇫🇯", "Finnland": "🇫🇮", "Frankreich": "🇫🇷", "Gabun": "🇬🇦", "Gambia": "🇬🇲", "Georgien": "🇬🇪", "Ghana": "🇬🇭", "Grenada": "🇬🇩", "Griechenland": "🇬🇷", "Guatemala": "🇬🇹", "Guinea": "🇬🇳", "Guinea-Bissau": "🇬🇼", "Guyana": "🇬🇾", "Haiti": "🇭🇹", "Honduras": "🇭🇳", "Indien": "🇮🇳", "Indonesien": "🇮🇩", "Irak": "🇮🇶", "Iran": "🇮🇷", "Irland": "🇮🇪", "Island": "🇮🇸", "Israel": "🇮🇱", "Italien": "🇮🇹", "Jamaika": "🇯🇲", "Japan": "🇯🇵", "Jemen": "🇾🇪", "Jordanien": "🇯🇴", "Kambodscha": "🇰🇭", "Kamerun": "🇨🇲", "Kanada": "🇨🇦", "Kap Verde": "🇨🇻", "Kasachstan": "🇰🇿", "Katar": "🇶🇦", "Kenia": "🇰🇪", "Kirgisistan": "🇰🇬", "Kiribati": "🇰🇮", "Kolumbien": "🇨🇴", "Komoren": "🇰🇲", "Kongo, Demokratische Republik": "🇨🇩", "Kongo, Republik": "🇨🇬", "Korea, Nord (Nordkorea)": "🇰🇵", "Korea, Süd (Südkorea)": "🇰🇷", "Kosovo": "🇽🇰", "Kroatien": "🇭🇷", "Kuba": "🇨🇺", "Kuwait": "🇰🇼", "Laos": "🇱🇦", "Lesotho": "🇱🇸", "Lettland": "🇱🇻", "Libanon": "🇱🇧", "Liberia": "🇱🇷", "Libyen": "🇱🇾", "Liechtenstein": "🇱🇮", "Litauen": "🇱🇹", "Luxemburg": "🇱🇺", "Madagaskar": "🇲🇬", "Malawi": "🇲🇼", "Malaysia": "🇲🇾", "Malediven": "🇲🇻", "Mali": "🇲🇱", "Malta": "🇲🇹", "Marokko": "🇲🇦", "Marshallinseln": "🇲 let LAENDER = [];
let currentFilter = "Alle", currentSearch = "", activeCards = new Set();

function alphaGroup(land){
  const c = land[0];
  return {"Ä":"A","Ö":"O","Ü":"U"}[c] || c.toUpperCase();
}

function getFiltered(){
  const q = currentSearch.toLowerCase();
  return LAENDER.filter(l => {
    const mc = currentFilter === "Alle" || l.Kontinent === currentFilter;
    const ms = !q || l.Land.toLowerCase().includes(q) || l.Hauptstadt.toLowerCase().includes(q);
    return mc && ms;
  });
}

function renderCard(land){
  const flag = FLAGS[land.Land] || "🌐";
  const isOpen = activeCards.has(land.Land);
  const card = document.createElement("div");
  card.className = "country-card" + (isOpen ? " open" : "");
  card.dataset.land = land.Land;
  const faktHTML = land.Fakt
    ? `<div class="info-block fakt-block"><div class="info-label">💡 Wusstest du?</div><div class="info-value">${land.Fakt}</div></div>`
    : "";
  card.innerHTML = `
    <div class="card-trigger">
      <span class="flag">${flag}</span>
      <span class="country-name">${land.Land}</span>
      <span class="continent-tag tag-${land.Kontinent}">${land.Kontinent}</span>
      <svg class="chevron" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-block"><div class="info-label">🏛 Hauptstadt</div><div class="info-value">${land.Hauptstadt}</div></div>
        <div class="info-block"><div class="info-label">👥 Bevölkerung</div><div class="info-value">${land.Bevölkerung}</div></div>
        <div class="info-block"><div class="info-label">📐 Fläche</div><div class="info-value">${land["Fläche"]}</div></div>
        ${faktHTML}
      </div>
    </div>`;
  card.querySelector(".card-trigger").addEventListener("click", () => {
    const open = card.classList.toggle("open");
    if(open) activeCards.add(land.Land); else activeCards.delete(land.Land);
  });
  return card;
}

function render(){
  const filtered = getFiltered();
  const main = document.getElementById("main");
  const noResults = document.getElementById("noResults");
  document.getElementById("resultInfo").textContent =
    filtered.length === LAENDER.length ? "" : filtered.length + " von " + LAENDER.length;
  Array.from(main.children).forEach(c => {
    if(!c.classList.contains("no-results") && !c.id === "loadingMsg") c.remove();
    if(c.id !== "noResults" && c.id !== "loadingMsg") c.remove();
  });
  if(!filtered.length){ noResults.style.display = "block"; return; }
  noResults.style.display = "none";

  if(currentFilter === "Alle"){
    let lastGroup = "";
    filtered.forEach(land => {
      const g = alphaGroup(land.Land);
      if(g !== lastGroup){
        lastGroup = g;
        const div = document.createElement("div");
        div.className = "alpha-divider";
        div.innerHTML = `<span class="alpha-letter">${g}</span><span class="alpha-line"></span>`;
        main.insertBefore(div, noResults);
      }
      main.insertBefore(renderCard(land), noResults);
    });
  } else {
    const group = document.createElement("div");
    group.className = "continent-group";
    group.innerHTML = `<div class="continent-header"><span class="continent-title">${currentFilter}</span><span class="continent-line"></span><span class="continent-count">${filtered.length} Länder</span></div>`;
    filtered.forEach(land => group.appendChild(renderCard(land)));
    main.insertBefore(group, noResults);
  }
}

function init(data){
  LAENDER = data;
  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("countBadge").textContent = LAENDER.length + " Länder";
  render();
}

// Daten laden
fetch("laender.json")
  .then(r => {
    if(!r.ok) throw new Error("Datei nicht gefunden");
    return r.json();
  })
  .then(data => init(data))
  .catch(() => {
    document.getElementById("loadingMsg").textContent =
      "⚠️ laender.json konnte nicht geladen werden. Stelle sicher, dass sie im selben Ordner liegt.";
  });

// Suche ein-/ausblenden
const searchToggleBtn = document.getElementById("searchToggleBtn");
const searchWrap = document.getElementById("searchWrap");
const searchInput = document.getElementById("searchInput");
searchToggleBtn.addEventListener("click", () => {
  const open = searchWrap.style.display === "none";
  searchWrap.style.display = open ? "block" : "none";
  searchToggleBtn.classList.toggle("active", open);
  if(open) { searchInput.focus(); }
  else { searchInput.value = ""; currentSearch = ""; render(); }
});

// Mehr-Menü
const moreBtn = document.getElementById("moreBtn");
const moreMenu = document.getElementById("moreMenu");
moreBtn.addEventListener("click", () => {
  moreMenu.classList.toggle("open");
  moreBtn.classList.toggle("active");
});
// Menü schließen bei Klick außerhalb
document.addEventListener("click", e => {
  if(!moreBtn.contains(e.target) && !moreMenu.contains(e.target)){
    moreMenu.classList.remove("open");
    moreBtn.classList.remove("active");
  }
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById("searchInput").addEventListener("input", e => { currentSearch = e.target.value; render(); });
document.getElementById("expandAllBtn").addEventListener("click", () => { getFiltered().forEach(l => activeCards.add(l.Land)); render(); });
document.getElementById("collapseAllBtn").addEventListener("click", () => { activeCards.clear(); render(); });

// Lernkarten
let fcData=[], fcIndex=0, fcCorrect=0, fcWrong=0, fcMode="reveal";
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function normalize(s){ return s.toLowerCase().trim().replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss").replace(/[^a-z0-9]/g,""); }
function closeFC(){ document.getElementById("flashcardOverlay").classList.remove("active"); }
function showFlashcard(){
  const fc = document.getElementById("flashcard");
  document.getElementById("flashcardOverlay").classList.add("active");
  if(fcIndex >= fcData.length){
    const pct = Math.round(fcCorrect/fcData.length*100);
    fc.innerHTML = `<div class="fc-result">${pct>=80?"🎉":pct>=50?"👍":"📚"} Fertig!</div><div class="fc-result-details">${fcCorrect} richtig · ${fcWrong} falsch · ${pct}%</div><div class="flashcard-btns"><button class="fc-btn fc-btn-reveal" id="fcRestartBtn">Nochmal</button><button class="fc-btn fc-btn-close" id="fcDoneBtn">Schließen</button></div>`;
    document.getElementById("fcRestartBtn").onclick = () => { fcIndex=0; fcCorrect=0; fcWrong=0; fcData=shuffle(fcData); showFlashcard(); };
    document.getElementById("fcDoneBtn").onclick = closeFC;
    return;
  }
  const land = fcData[fcIndex];
  const flag = FLAGS[land.Land] || "🌐";
  if(fcMode === "reveal"){
    fc.innerHTML = `<div class="flashcard-progress">${fcIndex+1} / ${fcData.length} · ✅ ${fcCorrect} · ❌ ${fcWrong}</div><span class="flashcard-flag">${flag}</span><div class="flashcard-question">Hauptstadt von<br><strong>${land.Land}</strong>?</div><div class="flashcard-answer" id="fcAnswer">${land.Hauptstadt}</div><div class="flashcard-btns" id="fcBtns"><button class="fc-btn fc-btn-reveal" id="fcRevealBtn">Antwort zeigen</button><button class="fc-btn fc-btn-close" id="fcCloseBtn">Abbrechen</button></div>`;
    document.getElementById("fcRevealBtn").onclick = () => {
      document.getElementById("fcAnswer").style.display = "block";
      document.getElementById("fcBtns").innerHTML = `<button class="fc-btn fc-btn-correct" id="fcOkBtn">✓ Gewusst</button><button class="fc-btn fc-btn-wrong" id="fcNokBtn">✗ Nicht gewusst</button>`;
      document.getElementById("fcOkBtn").onclick = () => { fcCorrect++; fcIndex++; showFlashcard(); };
      document.getElementById("fcNokBtn").onclick = () => { fcWrong++; fcIndex++; showFlashcard(); };
    };
    document.getElementById("fcCloseBtn").onclick = closeFC;
  } else {
    fc.innerHTML = `<div class="flashcard-progress">${fcIndex+1} / ${fcData.length} · ✅ ${fcCorrect} · ❌ ${fcWrong}</div><span class="flashcard-flag">${flag}</span><div class="flashcard-question">Hauptstadt von<br><strong>${land.Land}</strong>?</div><div class="fc-input-wrap"><input class="fc-input" id="fcInput" type="text" placeholder="Hauptstadt eingeben …" autocomplete="off" spellcheck="false"></div><div class="flashcard-answer" id="fcAnswer">Richtig: ${land.Hauptstadt}</div><div class="flashcard-btns" id="fcBtns"><button class="fc-btn fc-btn-reveal" id="fcCheckBtn">Prüfen</button><button class="fc-btn fc-btn-close" id="fcCloseBtn">Abbrechen</button></div>`;
    const input = document.getElementById("fcInput"); input.focus();
    const check = () => {
      if(!input.value.trim()) return;
      const ok = normalize(input.value) === normalize(land.Hauptstadt) || land.Hauptstadt.toLowerCase().includes(input.value.toLowerCase().trim());
      input.classList.add(ok ? "correct" : "wrong");
      document.getElementById("fcAnswer").style.display = "block";
      if(ok) fcCorrect++; else fcWrong++;
      document.getElementById("fcBtns").innerHTML = `<button class="fc-btn fc-btn-reveal" id="fcNextBtn">Weiter →</button>`;
      document.getElementById("fcNextBtn").onclick = () => { fcIndex++; showFlashcard(); };
    };
    input.addEventListener("keydown", e => { if(e.key === "Enter") check(); });
    document.getElementById("fcCheckBtn").onclick = check;
    document.getElementById("fcCloseBtn").onclick = closeFC;
  }
}
document.getElementById("startFlashcardsBtn").addEventListener("click", () => {
  const filtered = getFiltered();
  const fc = document.getElementById("flashcard");
  document.getElementById("flashcardOverlay").classList.add("active");
  moreMenu.classList.remove("open");
  moreBtn.classList.remove("active");

  // Buchstaben ermitteln die in der aktuellen Auswahl vorkommen
  const availableLetters = [...new Set(filtered.map(l => alphaGroup(l.Land)))].sort();
  let selectedLetters = new Set(availableLetters); // alle vorausgewählt

  function renderFcStart() {
    const letterBtns = availableLetters.map(l =>
      `<button class="fc-letter-btn${selectedLetters.has(l) ? ' active' : ''}" data-letter="${l}">${l}</button>`
    ).join('');
    const count = filtered.filter(l => selectedLetters.has(alphaGroup(l.Land))).length;
    fc.innerHTML = `
      <div class="fc-result" style="font-size:1.2rem;margin-bottom:8px">🃏 Lernkarten</div>
      <div class="fc-mode-select">
        <div class="fc-mode-label">Lernmodus:</div>
        <div class="fc-mode-btns">
          <button class="fc-mode-btn${fcMode==='reveal'?' active':''}" data-mode="reveal">Aufdecken</button>
          <button class="fc-mode-btn${fcMode==='type'?' active':''}" data-mode="type">Eingabe</button>
        </div>
      </div>
      <div class="fc-letter-filter">
        <div class="fc-letter-label">Buchstaben (${count} Länder):</div>
        <div class="fc-letter-btns" id="fcLetterBtns">
          <button class="fc-letter-btn${selectedLetters.size===availableLetters.length?' active':''}" data-letter="alle">Alle</button>
          ${letterBtns}
        </div>
      </div>
      <div class="flashcard-btns" style="margin-top:16px">
        <button class="fc-btn fc-btn-correct" id="fcStartBtn">Starten</button>
        <button class="fc-btn fc-btn-close" id="fcCancelBtn">Abbrechen</button>
      </div>`;

    fc.querySelectorAll(".fc-mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        fc.querySelectorAll(".fc-mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active"); fcMode = btn.dataset.mode;
      });
    });
    fc.querySelectorAll(".fc-letter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const l = btn.dataset.letter;
        if(l === "alle") {
          if(selectedLetters.size === availableLetters.length) selectedLetters.clear();
          else selectedLetters = new Set(availableLetters);
        } else {
          if(selectedLetters.has(l)) selectedLetters.delete(l);
          else selectedLetters.add(l);
        }
        renderFcStart();
      });
    });
    document.getElementById("fcStartBtn").onclick = () => {
      const pool = filtered.filter(l => selectedLetters.has(alphaGroup(l.Land)));
      if(!pool.length) return;
      fcData = shuffle(pool); fcIndex = 0; fcCorrect = 0; fcWrong = 0;
      showFlashcard();
    };
    document.getElementById("fcCancelBtn").onclick = closeFC;
  }
  renderFcStart();
});
document.getElementById("flashcardOverlay").addEventListener("click", e => { if(e.target === document.getElementById("flashcardOverlay")) closeFC(); });

</script>
</body>
</html>
